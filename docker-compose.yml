version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: stockscanner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockscanner
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stockscanner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: stockscanner-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://stockuser:stockpassword@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"

  celery-worker:
    build:
      context: ./backend
    container_name: stockscanner-worker
    command: celery -A app.celery_app:celery worker --loglevel=info
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://stockuser:stockpassword@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0

  celery-beat:
    build:
      context: ./backend
    container_name: stockscanner-beat
    command: celery -A app.celery_app:celery beat --loglevel=info
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://stockuser:stockpassword@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
    container_name: stockscanner-frontend
    restart: unless-stopped
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
